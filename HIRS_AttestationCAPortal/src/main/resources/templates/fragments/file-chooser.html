<th:block th:fragment="fileChooser(id, label,bodyContent)">
    <!-- File chooser icon anchor -->
    <a class="btn btn-primary text-decoration-none" th:href="'#' + ${id}" data-bs-toggle="modal" th:title="${label}">
        <img th:src="@{/icons/svg/upload-white-24dp.svg}" alt="File Chooser Icon" class="icon-text-spacing" />
        [[${label}]]
    </a>

    <!-- Include modal fragment -->
    <th:block th:replace="~{fragments/modal :: modal(
        id=${id},
        label=${label},
        bodyContent=${bodyContent},
        customFooterButtons=${null}
        )}"></th:block>
</th:block>
