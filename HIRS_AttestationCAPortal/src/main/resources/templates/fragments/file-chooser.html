<th:block th:fragment="fileChooser(id, label,bodyContent)">
    <!-- File chooser icon anchor -->
    <a class="text-decoration-none" th:href="'#' + ${id}" data-bs-toggle="modal">
        <img th:src="@{/icons/svg/upload-24dp.svg}" class="action-icons" alt="File Chooser Icon"
            data-bs-toggle="tooltip" th:title="${label}" th:attr="data-bs-title=${label}" />
    </a>

    <!-- Include modal fragment -->
    <th:block th:replace="~{fragments/modal :: modal(
        id=${id},
        label=${label},
        bodyContent=${bodyContent},
        customFooterButtons=${null}
        )}"></th:block>
</th:block>
