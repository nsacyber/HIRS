<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Title -->
    <title th:text="${page?.title}">Default Title</title>

    <!-- Favicons -->
    <link rel="icon" th:href="@{/icons/hirs.ico}" type="image/x-icon">
    <link rel="shortcut icon" th:href="@{/icons/hirs.ico}" type="image/x-icon">

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/css/normalize.css}" />
    <link rel="stylesheet" th:href="@{/lib/bootstrap-5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/lib/datatables-2.3.5/css/datatables.min.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />

    <!-- Page-specific styles -->
    <section layout:fragment="style"></section>

    <!-- Scripts -->
    <script th:src="@{/lib/jquery/jquery-3.7.1.min.js}"></script>
    <script th:src="@{/lib/jquery.spring-friendly/jquery.spring-friendly.min.js}"></script>
    <script th:src="@{/lib/datatables-2.3.5/js/datatables.min.js}"></script>
    <script th:src="@{/lib/bootstrap-5.3.8/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>

    <!-- Bootstrap 5 Toast and Tooltips initialization script -->
    <script>
        $(document).ready(function () {
            const disappearDelayTime = 8000; // Time in milliseconds before the toast message disappears

            // Show all toasts if present
            const toastElements = document.querySelectorAll('.toast');
            toastElements.forEach(function (toastElement) {
                const toast = new bootstrap.Toast(toastElement, {
                    delay: disappearDelayTime
                });
                toast.show();
            });

            // Initalize Bootstrap tooltips
            $('body').tooltip({
                selector: '[data-bs-toggle="tooltip"]',
                customClass: 'custom-tooltip-style'
            });
        });
    </script>

    <!-- Page-specific scripts -->
    <section layout:fragment="script"></section>
</head>

<body>
    <!-- Header -->
    <header id="header" class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-3">
                    <a class="navbar-brand" th:href="@{/}">
                        <img th:src="@{/images/hirs92.png}" alt="Logo" />
                    </a>
                </div>
                <div class="col page-title">
                    Attestation Certificate Authority
                    <div class="subtitle" th:if="${page?.subtitle}" th:text="${page?.subtitle}"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Layout container -->
    <div id="layout" class="container-fluid">

        <!-- Sidebar navigation fragment -->
        <div th:replace="~{fragments/side-navbar :: sideNavBar(page = ${page}, pages = ${pages})}"></div>

        <!-- Main content area with dynamic class -->
        <div th:class="${page?.hasMenu} ? 'main' : 'main-without-navigation'" role="main">
            <!-- Toast messages fragment -->
            <div th:replace="~{fragments/toast-messages :: toastMessages(messages = ${messages})}"></div>

            <div class="page-header">
                <h1 layout:fragment="pageHeaderTitle">Page Header Title</h1>
                <hr>
            </div>

            <div layout:fragment="content">
                <!-- Page-specific content goes here -->
            </div>

        </div>
    </div>

    <!-- Scroll to Top Button
    <button id="scrollTopBtn" class="btn btn-primary btn-lg position-fixed" style="bottom: 20px; right: 20px; "
        aria-label="Scroll to top" data-bs-toggle="tooltip" title="Back to top" type="button">
        <img th:src="@{/icons/svg/arrow-up-24dp.svg}" alt="Up">
    </button> -->
</body>

</html>
